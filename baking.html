<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FBE8C8" />
  <title>judy's bakery 🍞 — knead a recipe</title>
  <meta name="description" content="a tiny chatbot bakery — pick a texture, a flavor, a size, and i'll bake you a recipe." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=DotGothic16&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="baking.css" />
</head>
<body>
  <!-- ambient: warm sparkles + drifting flour specks -->
  <div class="ambient" aria-hidden="true">
    <span class="dust d1"></span>
    <span class="dust d2"></span>
    <span class="dust d3"></span>
    <span class="dust d4"></span>
    <span class="sparkle s1">✦</span>
    <span class="sparkle s2">✦</span>
    <span class="sparkle s3">✧</span>
  </div>

  <!-- top controls -->
  <a class="back-home" href="./" aria-label="back to judy zhu">
    <span class="arrow">‹</span> <span class="label">home</span>
  </a>
  <button class="music-btn" id="music-btn" aria-label="toggle music" aria-pressed="false">
    <span class="ico ico-off">🔇</span>
    <span class="ico ico-on">🎵</span>
    <span class="ripple"></span>
  </button>

  <main class="stage">

    <!-- ── SCENE ── minimal: anpan + tiny chef cat -->
    <section class="scene-wrap">
      <svg class="scene" viewBox="0 0 360 280" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <radialGradient id="warmLight" cx="55%" cy="42%" r="55%">
            <stop offset="0%"  stop-color="#FFF0CF" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#FFF0CF" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="anpanFill" cx="40%" cy="32%" r="68%">
            <stop offset="0%"  stop-color="#F4C189"/>
            <stop offset="58%" stop-color="#CE864A"/>
            <stop offset="100%" stop-color="#7E4419"/>
          </radialGradient>
          <radialGradient id="anpanShine" cx="32%" cy="26%" r="38%">
            <stop offset="0%"  stop-color="#FFF6E0" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#FFF6E0" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stop-color="#F08368" stop-opacity="0.75"/>
            <stop offset="100%" stop-color="#F08368" stop-opacity="0"/>
          </radialGradient>
          <pattern id="ginghamRed" width="8" height="8" patternUnits="userSpaceOnUse">
            <rect width="8" height="8" fill="#F4DCC6"/>
            <rect width="4" height="4" fill="#C95A47" opacity="0.85"/>
            <rect x="4" y="4" width="4" height="4" fill="#C95A47" opacity="0.85"/>
            <rect width="4" height="4" fill="#E2987C" opacity="0.55" x="4"/>
            <rect width="4" height="4" fill="#E2987C" opacity="0.55" y="4"/>
          </pattern>
        </defs>

        <!-- soft warm halo behind characters -->
        <circle cx="200" cy="130" r="150" fill="url(#warmLight)"/>

        <!-- ground shadow -->
        <ellipse cx="200" cy="248" rx="92" ry="9" fill="#3D2A1F" opacity="0.14"/>

        <!-- ─── CHEF CAT (small, left of anpan) ─── -->
        <g class="cat" transform="translate(86 188)">
          <ellipse cx="0" cy="58" rx="28" ry="4" fill="#3D2A1F" opacity="0.16"/>
          <g class="bob-cat">
            <!-- body -->
            <path d="M-24 56 Q-30 -6 0 -12 Q30 -6 24 56 Z"
                  fill="#FFF6EA" stroke="#7A5439" stroke-width="1.8" stroke-linejoin="round"/>
            <!-- calico patches -->
            <ellipse cx="-10" cy="24" rx="9" ry="14" fill="#D98F4E" opacity="0.92"/>
            <ellipse cx="13"  cy="38" rx="7" ry="9"  fill="#7A5439" opacity="0.85"/>
            <!-- bandana -->
            <path d="M-22 22 Q0 32 22 22 L20 30 Q0 40 -20 30 Z"
                  fill="url(#ginghamRed)" stroke="#7A5439" stroke-width="1.4" stroke-linejoin="round"/>
            <!-- ears -->
            <path d="M-15 -6 L-19 -20 L-4 -10 Z" fill="#FFF6EA" stroke="#7A5439" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M14 -8 L20 -22 L4 -12 Z"    fill="#FFF6EA" stroke="#7A5439" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- chef toque -->
            <g transform="translate(0 -18)">
              <ellipse cx="0" cy="0" rx="18" ry="5" fill="#FFFCF0" stroke="#7A5439" stroke-width="1.4"/>
              <path d="M-16 0 Q-19 -18 -8 -20 Q-4 -27 4 -23 Q11 -28 15 -17 Q22 -14 17 0 Z"
                    fill="#FFFCF0" stroke="#7A5439" stroke-width="1.4" stroke-linejoin="round"/>
            </g>
            <!-- face -->
            <circle cx="-9" cy="10" r="5" fill="url(#cheek)"/>
            <circle cx="11" cy="10" r="5" fill="url(#cheek)"/>
            <g class="cat-eyes">
              <path d="M-12 4 Q-9 1 -6 4" fill="none" stroke="#2A1A10" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M6 4 Q9 1 12 4"   fill="none" stroke="#2A1A10" stroke-width="1.7" stroke-linecap="round"/>
            </g>
            <path d="M-2 12 Q0 14 2 12" fill="none" stroke="#2A1A10" stroke-width="1.4" stroke-linecap="round"/>
            <!-- waving paw -->
            <g class="wave-paw">
              <ellipse cx="22" cy="30" rx="7" ry="5.5" fill="#FFF6EA" stroke="#7A5439" stroke-width="1.5"/>
              <path d="M18 28 q2 -2 4 0 M22 26 q2 -2 4 0" stroke="#7A5439" stroke-width="0.8" fill="none"/>
            </g>
          </g>
        </g>

        <!-- ─── ANPAN (main, centered right) ─── -->
        <g class="anpan" transform="translate(218 150)">
          <g class="bob-anpan">
            <!-- body -->
            <ellipse cx="0" cy="0" rx="78" ry="72" fill="url(#anpanFill)" stroke="#6E3F1F" stroke-width="2.2"/>
            <!-- glaze shine -->
            <ellipse cx="-22" cy="-30" rx="36" ry="18" fill="url(#anpanShine)"/>
            <!-- sesame seeds (sparse, intentional placement) -->
            <g fill="#5C3A1B" opacity="0.88">
              <ellipse cx="-26" cy="-42" rx="2.6" ry="1.6" transform="rotate(-18 -26 -42)"/>
              <ellipse cx="2"   cy="-52" rx="2.6" ry="1.6" transform="rotate(8 2 -52)"/>
              <ellipse cx="32"  cy="-40" rx="2.6" ry="1.6" transform="rotate(-22 32 -40)"/>
              <ellipse cx="54"  cy="-12" rx="2.6" ry="1.6" transform="rotate(30 54 -12)"/>
              <ellipse cx="-54" cy="-8"  rx="2.6" ry="1.6" transform="rotate(-38 -54 -8)"/>
              <ellipse cx="44"  cy="22"  rx="2.6" ry="1.6" transform="rotate(20 44 22)"/>
              <ellipse cx="-40" cy="32"  rx="2.6" ry="1.6" transform="rotate(-15 -40 32)"/>
            </g>
            <!-- cheeks -->
            <circle cx="-34" cy="14" r="12" fill="url(#cheek)"/>
            <circle cx="34"  cy="14" r="12" fill="url(#cheek)"/>
            <!-- eyes -->
            <g class="anpan-eyes">
              <ellipse cx="-18" cy="-6" rx="6"   ry="7.5" fill="#2A1A10"/>
              <ellipse cx="18"  cy="-6" rx="6"   ry="7.5" fill="#2A1A10"/>
              <circle  cx="-16" cy="-10" r="2.4" fill="#FFF6EA"/>
              <circle  cx="20"  cy="-10" r="2.4" fill="#FFF6EA"/>
              <circle  cx="-20" cy="-4"  r="0.9" fill="#FFF6EA" opacity="0.7"/>
            </g>
            <!-- mouth -->
            <path class="anpan-mouth" d="M-9 16 Q0 26 9 16 Q4 20 -9 16 Z"
                  fill="#5C2A1A" stroke="#3D2114" stroke-width="1.8" stroke-linejoin="round"/>
            <!-- tongue -->
            <path d="M-4 20 Q0 24 4 20" fill="#F08368" opacity="0.95"/>
            <!-- gingham scarf bow -->
            <g transform="translate(0 60)">
              <path d="M-46 0 Q0 18 46 0 L42 14 Q0 28 -42 14 Z"
                    fill="url(#ginghamRed)" stroke="#6E3F1F" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M-4 -2 Q-8 14 -22 16 Q-14 22 -2 18 Z"
                    fill="url(#ginghamRed)" stroke="#6E3F1F" stroke-width="1.4" stroke-linejoin="round"/>
              <path d="M4 -2 Q8 14 22 16 Q14 22 2 18 Z"
                    fill="url(#ginghamRed)" stroke="#6E3F1F" stroke-width="1.4" stroke-linejoin="round"/>
              <circle r="3.5" fill="#A8412E"/>
            </g>
          </g>
        </g>

      </svg>

      <!-- progress dots -->
      <div class="progress" role="progressbar" aria-label="recipe progress">
        <span class="dot active" data-step="0"></span>
        <span class="dot" data-step="1"></span>
        <span class="dot" data-step="2"></span>
        <span class="dot" data-step="3"></span>
        <span class="dot" data-step="4"></span>
        <span class="dot" data-step="5"></span>
      </div>
    </section>

    <!-- ── DIALOG ── -->
    <section class="dialog-stage">
      <div class="dialog-card" id="dialog">
        <div class="speaker">
          <span class="speaker-portrait" id="speaker-portrait" aria-hidden="true">🍞</span>
          <span class="speaker-name" id="speaker-name">あんパン <em>· anpan</em></span>
          <span class="speaker-tag" id="speaker-tag">★ baker</span>
        </div>
        <p class="dialog-text" id="dialog-text"></p>
        <span class="dialog-cursor" id="dialog-cursor">▼</span>
      </div>

      <div class="choices" id="choices"></div>
    </section>
  </main>

  <footer class="tiny-foot">
    <span>baked by judy · prototype 0.3</span>
  </footer>

  <script src="baking.js" defer></script>
</body>
</html>
